name: Release APK

# Bei Push eines Versions-Tags (z. B. v1.1.0) wird die APK gebaut
# und als GitHub-Release-Anhang veröffentlicht. Die App lädt sie dann
# über ihren eingebauten Update-Check.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Signatur einrichten (fester Release-Key aus Secrets)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret KEYSTORE_BASE64 fehlt – Release-Signatur nicht moeglich."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/kl-release.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../kl-release.jks
          EOF

      - name: APK bauen
        run: flutter build apk --release

      - name: APK umbenennen
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/KL-Tool-${{ github.ref_name }}.apk"

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
